name: Build and Deploy to Alibaba Cloud

# 触发条件：只有当 main 分支上的 server-nest 文件夹下的代码发生变动时，才触发部署
on:
  push:
    branches:
      - main
    paths:
      - 'server-nest/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 让 GitHub 免费提供 Ubuntu 虚拟机帮我们打包，不占服务器内存

    steps:
    - name: 1. 拉取仓库代码
      uses: actions/checkout@v4

    - name: 2. 登录阿里云容器镜像仓库
      uses: docker/login-action@v3
      with:
        # ⚠️ 如果你的阿里云镜像仓不是杭州地域，请把下面的 cn-hangzhou 改成你的实际地域代码（如 cn-beijing, cn-shenzhen）
        registry: registry.cn-hangzhou.aliyuncs.com
        username: ${{ secrets.ALIYUN_REGISTRY_USER }}
        password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

    - name: 3. 构建 Docker 镜像并推送到阿里云
      uses: docker/build-push-action@v5
      with:
        context: ./server-nest          # 💡 核心配置：指定 Docker 运行的上下文在后端子目录下
        file: ./server-nest/Dockerfile  # 💡 核心配置：明确指定 Dockerfile 的绝对路径
        push: true
        # ⚠️ 请把 [my-project-space] 修改为你自己在阿里云创建的“命名空间”名称！
        tags: registry.cn-hangzhou.aliyuncs.com/my-project-space-fjx/backend-app:latest

    - name: 4. 远程登录阿里云服务器并刷新容器
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          # 1. 在你的云服务器上登录阿里云镜像仓
          docker login --username=${{ secrets.ALIYUN_REGISTRY_USER }} --password=${{ secrets.ALIYUN_REGISTRY_PASSWORD }} registry.cn-hangzhou.aliyuncs.com
          
          # 2. 从镜像仓拉取刚刚在云端打包好的最新镜像（⚠️ 记得修改 [my-project-space]）
          docker pull registry.cn-hangzhou.aliyuncs.com/my-project-space-fjx/backend-app:latest
          
          # 3. 停止并删除可能正在运行的旧容器
          docker stop my-nestjs-container || true
          docker rm my-nestjs-container || true
          
          # 4. 启动全新的 NestJS 容器，将容器内的 3000 端口映射到宿主机的 3000 端口
          docker run -d \
            --name my-nestjs-container \
            -p 3000:3000 \
            --restart always \
            registry.cn-hangzhou.aliyuncs.com/my-project-space/backend-app:latest
            
          # 5. 自动清理服务器上残留的旧镜像碎屑，释放 2G 内存小服务器的磁盘空间
          docker image prune -f