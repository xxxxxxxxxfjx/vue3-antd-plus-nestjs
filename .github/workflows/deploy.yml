name: Build and Deploy to Alibaba Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'server-nest/**'

# 💡 新加：强制 GitHub Actions 运行在最新的 Node.js 24 环境下，消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 拉取仓库代码
      uses: actions/checkout@v4

    - name: 2. 登录阿里云容器镜像仓库
      uses: docker/login-action@v3
      with:
        registry: registry.cn-hangzhou.aliyuncs.com
        username: ${{ secrets.ALIYUN_REGISTRY_USER }}
        password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

    - name: 3. 构建 Docker 镜像并推送到阿里云
      uses: docker/build-push-action@v5
      with:
        context: ./server-nest
        file: ./server-nest/Dockerfile
        push: true
        tags: registry.cn-hangzhou.aliyuncs.com/my-project-space-fjx/backend-app:latest

    - name: 4. 远程登录阿里云服务器并刷新容器
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          docker login --username=${{ secrets.ALIYUN_REGISTRY_USER }} --password=${{ secrets.ALIYUN_REGISTRY_PASSWORD }} registry.cn-hangzhou.aliyuncs.com
          docker pull registry.cn-hangzhou.aliyuncs.com/my-project-space-fjx/backend-app:latest
          
          docker stop my-nestjs-container || true
          docker rm my-nestjs-container || true
          
          docker run -d \
            --name my-nestjs-container \
            -p 3000:3000 \
            --restart always \
            registry.cn-hangzhou.aliyuncs.com/my-project-space/backend-app:latest
            
          docker image prune -f