name: Build and Deploy to Alibaba Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'server-nest/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 拉取仓库代码
      uses: actions/checkout@v4

    - name: 2. 登录阿里云容器镜像仓库
      uses: docker/login-action@v3
      with:
        # 💡 已修正：替换为你专属于你的成都个人版镜像仓域名
        registry: crpi-j1sda30zuzkot77k.cn-chengdu.personal.cr.aliyuncs.com
        username: ${{ secrets.ALIYUN_REGISTRY_USER }}
        password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

    - name: 3. 构建 Docker 镜像并推送到阿里云
      uses: docker/build-push-action@v5
      with:
        context: ./server-nest
        file: ./server-nest/Dockerfile
        push: true
        # 💡 已修正：请把下方的 [你的命名空间] 替换为你自己在成都控制台创建的命名空间名字！
        tags: crpi-j1sda30zuzkot77k.cn-chengdu.personal.cr.aliyuncs.com/my-project-space-fjx/backend-app:latest

    - name: 4. 远程登录阿里云服务器并刷新容器
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }} # 💡 已经由 password 修正为安全的密钥 key
        script: |
          # 1. 登录阿里云镜像仓
          docker login --username=${{ secrets.ALIYUN_REGISTRY_USER }} --password=${{ secrets.ALIYUN_REGISTRY_PASSWORD }} crpi-j1sda30zuzkot77k.cn-chengdu.personal.cr.aliyuncs.com
          
          # 2. 拉取最新镜像（💡 记得修改 [你的命名空间]）
          docker pull crpi-j1sda30zuzkot77k.cn-chengdu.personal.cr.aliyuncs.com/my-project-space-fjx/backend-app:latest
          
          # 3. 停止并删除旧容器
          docker stop my-nestjs-container || true
          docker rm my-nestjs-container || true
          
          # 4. 启动全新的 NestJS 容器
          docker run -d \
            --name my-nestjs-container \
            -p 3000:3000 \
            --restart always \
            crpi-j1sda30zuzkot77k.cn-chengdu.personal.cr.aliyuncs.com/my-project-space-fjx/backend-app:latest
            
          # 5. 清理碎屑
          docker image prune -f